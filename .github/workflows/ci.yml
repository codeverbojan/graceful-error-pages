name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_call:
    inputs:
      full:
        description: 'Run all CI jobs including plugin check'
        type: boolean
        default: false

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          tools: composer:v2, cs2pr
          coverage: none

      - name: Install Composer dependencies
        run: composer install --no-progress --prefer-dist

      - name: PHP syntax check
        run: "! find src/ -name '*.php' -exec php -l {} \\; 2>&1 | grep -i 'parse error'"

      - name: PHPCS
        run: composer lint -- -q --report=checkstyle | cs2pr

      - name: PHPStan
        run: composer analyze -- --no-progress --error-format=github

  test-unit:
    name: Unit Tests (PHP ${{ matrix.php }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php: ['8.1', '8.2', '8.3', '8.4']
    steps:
      - uses: actions/checkout@v6

      - name: Set up PHP ${{ matrix.php }}
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          tools: composer:v2
          coverage: none

      - name: Install Composer dependencies
        run: composer install --no-progress --prefer-dist

      - name: Run unit tests
        run: php -d memory_limit=512M vendor/bin/phpunit --testsuite Unit --testdox

  plugin-check:
    name: Plugin Check
    if: inputs.full
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          coverage: none

      - name: Build distribution copy
        run: |
          mkdir -p build/graceful-error-pages
          rsync -rc --exclude-from=.distignore . build/graceful-error-pages/

      - name: Run plugin check
        uses: wordpress/plugin-check-action@v1
        with:
          build-dir: build/graceful-error-pages
          ignore-warnings: true

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Build distribution zip
        run: |
          mkdir -p build/graceful-error-pages
          rsync -rc --exclude-from=.distignore . build/graceful-error-pages/
          cd build && zip -r graceful-error-pages.zip graceful-error-pages/

      - name: Upload zip artifact
        uses: actions/upload-artifact@v7
        with:
          name: graceful-error-pages
          path: build/graceful-error-pages.zip
          retention-days: 7
